# cargo-about configuration for THIRD_PARTY_NOTICES
# Keep `accepted` in sync with deny.toml [licenses].allow

accepted = [
    "GPL-2.0-or-later",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "MIT",
    "ISC",
    "OpenSSL",
    "BSL-1.0",
    "Apache-2.0",
    "EPL-2.0",
    "MPL-2.0",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Zlib",
]

ignore-dev-dependencies = true
ignore-build-dependencies = false
