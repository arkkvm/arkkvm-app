syntax = "proto3";

package arkkvm.usb_devices.v1;

// Device function switches (mirrors config::DeviceSwitches).
message DeviceSwitches {
  bool hid_kb_rel_enabled = 1; // keyboard + relative mouse (single HID function)
  bool hid_abs_enabled = 2;
  reserved 3;
  reserved "hid_rel_enabled";
  bool ums_vm_enabled = 4;
  bool ums_ft_enabled = 5;
  bool uac1_enabled = 6;
  bool uvc_enabled = 7;
} 

enum UMS_VM_TYPE{
    UNKNOWN = 0;
    VM_CD_ROM = 1;
    VM_DISK= 2;
}

message UsbDeviceInfo{
  DeviceSwitches switches = 1;
  UMS_VM_TYPE ums_vm_type = 2;
  string ums_vm_path = 3;
  string ums_ft_path = 4;
}

